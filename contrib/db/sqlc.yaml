version: "2"
servers:
  - engine: postgresql
    uri: postgresql://postgres:postgres@localhost:5432/sqlc?sslmode=disable

overrides:
  go:
    overrides:
      - db_type: "uuid"
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"
      - db_type: "pg_catalog.timestamptz"
        go_type:
          import: "time"
          type: "Time"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "schema"
    database:
      managed: true
    rules:
      - sqlc/db-prepare
    gen:
      go:
        package: "db"
        out: "gen/go"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
