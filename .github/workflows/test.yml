name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Create workspace
        run: |
          go work init
          go work use .
          go work use adk-go
          go work use contrib/redisconn
          go work use contrib/a2aproto/a2a/v1
          go work use contrib/db

      - name: Generate code
        run: go generate ./...

      - name: Run tests
        run: go test -v -race -shuffle=on ./...
